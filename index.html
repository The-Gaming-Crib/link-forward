<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        (function() {
            // Get the current hostname
            const currentHost = window.location.hostname;

            // Define your redirection map
            const redirectMap = {
                "games.thegamingcrib.net": "https://thegamingcrib.net/games",
                "2.example.com": "https://blabla2.example.com",
                "3.example.com": "https://another-destination.com"
            };

            // Check if the current host exists in our map
            if (redirectMap[currentHost]) {
                window.location.href = redirectMap[currentHost];
            } else {
                // Optional: Fallback if the domain doesn't match anything
                document.body.innerHTML = "<h1>Domain not recognized.</h1>";
            }
        })();
    </script>
</head>
<body>
    <p>If you are not redirected, reload the page.</p>
</body>
</html>
